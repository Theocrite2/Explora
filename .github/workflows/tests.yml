name: Run Tests

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: explora_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      TESTING: "true"
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/explora_test?connect_timeout=10
      JWT_SECRET_KEY: ci-test-jwt-secret
      SECRET_KEY: ci-test-secret

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install GDAL / PostGIS system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y gdal-bin libgdal-dev libgeos-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Enable PostGIS extension
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -d explora_test -c "CREATE EXTENSION IF NOT EXISTS postgis;"

      - name: Run pytest
        run: pytest test_api.py -v --timeout=60
