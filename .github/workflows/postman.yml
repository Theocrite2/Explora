name: Postman

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  newman:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install Newman
        run: npm install -g newman

      - name: Run Postman collection
        run: newman run Explora_API.postman_collection.json